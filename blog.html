<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - C.J Philip</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .blog-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 2rem;
        }

        .blog-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .blog-header p {
            color: var(--gray);
            font-size: 1.1rem;
        }

        .blog-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.6rem 1.5rem;
            border: 2px solid var(--accent);
            background: white;
            color: var(--primary);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
        }

        .filter-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        .posts-grid {
            display: grid;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .post-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .post-card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            transform: translateY(-4px);
        }

        .post-header {
            padding: 1.5rem;
            background: linear-gradient(135deg, var(--light), var(--cream));
            border-bottom: 2px solid var(--border);
        }

        .post-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .post-category {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .post-date {
            color: var(--gray);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .featured-badge {
            display: inline-block;
            background: var(--gold);
            color: var(--primary);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .post-title {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        .post-content {
            padding: 1.5rem;
        }

        .post-excerpt {
            color: var(--dark-text);
            line-height: 1.8;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .post-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .post-tag {
            background: #f0f0f0;
            color: var(--gray);
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .read-more {
            display: inline-block;
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .read-more:hover {
            color: var(--gold);
            transform: translateX(4px);
        }

        .full-post {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            border: 2px solid var(--border);
            margin-bottom: 2rem;
        }

        .full-post h2 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 1rem;
            font-family: 'Playfair Display', serif;
        }

        .full-post .post-meta {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .full-post-content {
            line-height: 2;
            color: var(--dark-text);
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }

        .back-link {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--gold);
        }

        .empty-message {
            text-align: center;
            padding: 3rem;
            color: var(--gray);
        }

        .empty-message h2 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .blog-container {
                padding: 1rem;
            }

            .blog-header h1 {
                font-size: 2rem;
            }

            .post-title {
                font-size: 1.2rem;
            }

            .full-post {
                padding: 1rem;
            }
        }
    </style>
    <script src="scroll-animations.js"></script>
    <script src="sidebar-toggle.js"></script>
    <script src="settings.js"></script>
    <script src="blog-system.js"></script>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <span>C,J Philip</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="youtube.html">YouTube</a></li>
                <li class="dropdown">
                    <span class="dropdown-toggle">Blog</span>
                    <div class="dropdown-content">
                        <a href="blog.html">All Posts</a>
                        <a href="blog-admin.html">Admin Panel</a>
                    </div>
                </li>
                <li class="dropdown">
                    <span class="dropdown-toggle">Reviews</span>
                    <div class="dropdown-content">
                        <a href="letterboxd.html">Letterboxd Reviews</a>
                        <a href="book-reviews.html">Book Reviews</a>
                    </div>
                </li>
                <li class="dropdown">
                    <span class="dropdown-toggle">Short Stories</span>
                    <div class="dropdown-content">
                        <a href="alvora.html">Alvora</a>
                        <a href="zehndar.html">Zehndar</a>
                    </div>
                </li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><a href="settings.html" class="settings-icon" title="Settings">⚙️</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-content-wrapper">
        <div class="blog-container">
            <div class="blog-header">
                <h1>Blog</h1>
                <p>Stories, Tips, and Updates</p>
            </div>

            <!-- Category Filters -->
            <div class="blog-filters" id="category-filters"></div>

            <!-- Posts View -->
            <div id="posts-view">
                <div class="posts-grid" id="posts-grid"></div>
            </div>

            <!-- Full Post View -->
            <div id="full-post-view" style="display: none;">
                <a href="javascript:showPosts()" class="back-link">← Back to Posts</a>
                <div id="full-post-content"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 C.J Philip. All rights reserved.</p>
    </footer>

    <script>
        let allPosts = [];
        let currentFilter = 'all';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadPosts();
            setupFilters();
        });

        // Load posts from blog system
        function loadPosts() {
            allPosts = window.BlogAPI.getPosts();
            renderPosts();
        }

        // Setup category filters
        function setupFilters() {
            const categories = window.BlogAPI.getCategories();
            const filterContainer = document.getElementById('category-filters');

            const allBtn = document.createElement('button');
            allBtn.className = 'filter-btn active';
            allBtn.textContent = 'All';
            allBtn.onclick = () => filterByCategory('all');
            filterContainer.appendChild(allBtn);

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                btn.onclick = () => filterByCategory(cat);
                filterContainer.appendChild(btn);
            });
        }

        // Filter posts by category
        function filterByCategory(category) {
            currentFilter = category;

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderPosts();
        }

        // Render posts grid
        function renderPosts() {
            const postsView = document.getElementById('posts-view');
            const fullPostView = document.getElementById('full-post-view');
            fullPostView.style.display = 'none';
            postsView.style.display = 'block';

            const filteredPosts = currentFilter === 'all' 
                ? allPosts 
                : allPosts.filter(p => p.category === currentFilter);

            const grid = document.getElementById('posts-grid');

            if (filteredPosts.length === 0) {
                grid.innerHTML = '<div class="empty-message"><h2>No posts yet</h2><p>Check back soon for new content!</p></div>';
                return;
            }

            grid.innerHTML = filteredPosts.map(post => `
                <div class="post-card fade-in-section" onclick="showPost('${post.id}')">
                    <div class="post-header">
                        <div class="post-meta">
                            <span class="post-category">${post.category}</span>
                            <span class="post-date">${new Date(post.date).toLocaleDateString()}</span>
                            ${post.featured ? '<span class="featured-badge">Featured</span>' : ''}
                        </div>
                        <h2 class="post-title">${post.title}</h2>
                    </div>
                    <div class="post-content">
                        <p class="post-excerpt">${post.excerpt}</p>
                        ${post.tags.length > 0 ? `
                            <div class="post-tags">
                                ${post.tags.map(tag => `<span class="post-tag">#${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                        <a href="javascript:void(0)" class="read-more">Read More →</a>
                    </div>
                </div>
            `).join('');
        }

        // Show individual post
        function showPost(postId) {
            const post = window.BlogAPI.getPost(postId);
            if (!post) return;

            const postsView = document.getElementById('posts-view');
            const fullPostView = document.getElementById('full-post-view');
            const fullPostContent = document.getElementById('full-post-content');

            postsView.style.display = 'none';
            fullPostView.style.display = 'block';

            fullPostContent.innerHTML = `
                <div class="full-post fade-in-section">
                    <h2>${post.title}</h2>
                    <div class="post-meta">
                        <span class="post-category">${post.category}</span>
                        <span class="post-date">${new Date(post.date).toLocaleDateString()}</span>
                        <span style="color: var(--gray);">by ${post.author}</span>
                        ${post.featured ? '<span class="featured-badge">Featured</span>' : ''}
                    </div>
                    <div class="full-post-content">${post.content.replace(/\n/g, '<br><br>')}</div>
                    ${post.tags.length > 0 ? `
                        <div class="post-tags" style="margin-top: 2rem; padding-top: 2rem; border-top: 2px solid var(--border);">
                            ${post.tags.map(tag => `<span class="post-tag">#${tag}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `;

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Show posts grid
        function showPosts() {
            renderPosts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
